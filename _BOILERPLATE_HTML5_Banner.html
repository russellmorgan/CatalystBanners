<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">

  <!--
  ============================================================
  BANNER CONFIG — update these for each banner
  ============================================================
  Naming convention: MMDDYY_Client-Brand_Description_HTML5_VeevaCode_Size
  Example:           043026_Catalyst-Agamree_NowApproved_HTML5_AGA-0038_300x250
  ============================================================
  -->
  <meta name="ad.size"         content="width=300,height=250">
  <meta name="veeva-code"      content="AGA-0000">
  <meta name="expiration-date" content="MM/DD/YYYY">

  <!--
  ============================================================
  CLICK TAGS — destination URLs only, NO UTMs
  UTM params are appended by GCM at serve time via Enabler.exit()
  Add clickTag3, clickTag4, etc. as needed
  ============================================================
  -->
  <script type="text/javascript">
    var clickTag  = "https://example.com";
    var clickTag2 = "https://example.com/prescribing-information.pdf";
  </script>

  <!-- Google Campaign Manager Studio Enabler (required for GCM trafficking) -->
  <script src="https://s0.2mdn.net/ads/studio/Enabler.js"></script>

  <!-- GSAP 3 — animation engine -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

  <style>
    /* ── Reset ───────────────────────────────────────────── */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* Banners are served in an iframe — these prevent browser defaults
       from adding margin/scrollbars that shift content outside the frame.
       cursor and font-smoothing set here so absolutely-positioned layers
       (bg-exit, pi-exit) can't override them. */
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      cursor: pointer;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Banner shell — match ad.size meta above ─────────── */
    #banner {
      position: relative;
      width:  300px;
      height: 250px;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #ffffff;
    }

    /* ── Background ──────────────────────────────────────── */
    #bg {
      position: absolute;
      inset: 0;
      background: #003366; /* brand BG color */
    }

    /* ── Animation frames ────────────────────────────────── */
    /*
      7-keyframe layout (default):
        Frames 1–6: 3s hold each  →  22.8s  (incl. 0.4s fade in/out)
        Frame 7:    6.4s hold     →   7.2s  (incl. 0.4s fade in/out)
        Total:                        30.0s

      To use 6 keyframes instead:
        Comment out #frame-7 below and its timeline block in buildTimeline().
        Adjust hold durations in remaining frames to fill 30s.
    */
    #frame-1,
    #frame-2,
    #frame-3,
    #frame-4,
    #frame-5,
    #frame-6,
    #frame-7 {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      padding: 0 16px;
    }

    /* Image element — centered, maintains aspect ratio */
    #frame-1 img,
    #frame-2 img,
    #frame-3 img,
    #frame-4 img,
    #frame-5 img,
    #frame-6 img,
    #frame-7 img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    /* Optional full-screen background color for frames */
    .full-bg {
      background: #8EBE4E;
    }

    /* Optional text overlays (headline/subline) — comment in if needed */
    .headline {
      color: #ffffff;
      font-size: 22px;
      font-weight: bold;
      text-align: center;
      line-height: 1.2;
    }

    .subline {
      color: #ffffff;
      font-size: 13px;
      text-align: center;
      margin-top: 8px;
      line-height: 1.3;
    }

    /* ── CTA bar — animates in on frame 7 ───────────────── */
    #cta-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 40px;
      background: #44264A; /* brand CTA color */
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
    }

    #cta-bar span {
      color: #ffffff;
      font-size: 14px;
      font-weight: bold;
      letter-spacing: 0.5px;
    }

    /* ── Veeva / expiration — present in creative per S&B spec ── */
    #legal {
      position: absolute;
      bottom: 2px;
      right: 4px;
      font-size: 7px;
      color: rgba(255,255,255,0.01); /* effectively hidden; increase opacity if ISI/legal requires visibility */
      pointer-events: none;
      white-space: nowrap;
    }

    /* ── Click-exit overlay — primary URL ───────────────── */
    #bg-exit {
      position: absolute;
      inset: 0;
      z-index: 10;
      cursor: pointer;
    }

    /* ── Secondary click zone — PI / prescribing info ────── */
    #pi-exit {
      position: absolute;
      bottom: 44px;
      right: 4px;
      width: 80px;
      height: 16px;
      z-index: 20;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div id="banner">

    <!-- Background -->
    <div id="bg"></div>

    <!-- ── Frames — images centered ─────────────────────── -->
    <!-- Place images in assets/ folder. To add text overlay,
         uncomment <p> tags below and set z-index higher than img -->

    <div id="frame-1">
      <img src="assets/frame-1.png" alt="Frame 1">
      <!-- <p class="headline">Frame 1 Headline</p> -->
    </div>

    <div id="frame-2">
      <img src="assets/frame-2.png" alt="Frame 2">
      <!-- <p class="headline">Frame 2 Headline</p> -->
    </div>

    <div id="frame-3">
      <img src="assets/frame-3.png" alt="Frame 3">
      <!-- <p class="headline">Frame 3 Headline</p> -->
    </div>

    <div id="frame-4">
      <img src="assets/frame-4.png" alt="Frame 4">
      <!-- <p class="headline">Frame 4 Headline</p> -->
    </div>

    <div id="frame-5">
      <img src="assets/frame-5.png" alt="Frame 5">
      <!-- <p class="headline">Frame 5 Headline</p> -->
    </div>

    <div id="frame-6">
      <img src="assets/frame-6.png" alt="Frame 6">
      <!-- <p class="headline">Frame 6 Headline</p> -->
    </div>

    <!-- End card — comment out entire div if using 6 keyframes -->
    <div id="frame-7">
      <img src="assets/frame-7.png" alt="End Card">
      <!-- <p class="headline">End Card Headline</p> -->
    </div>

    <!-- CTA bar — appears with end card -->
    <div id="cta-bar"><span>Learn More</span></div>

    <!-- Veeva code + expiration (required per S&B handoff spec) -->
    <div id="legal">
      <span id="veeva-display">AGA-0000</span>
      &nbsp;|&nbsp;
      Exp:&nbsp;<span id="exp-display">MM/DD/YYYY</span>
    </div>

    <!-- ── Click exits — inline onclick required by GCM ──── -->
    <!-- DO NOT use addEventListener — GCM validator won't detect it -->
    <div id="bg-exit" onclick="exitHandler()"></div>
    <div id="pi-exit" onclick="exitHandler2()"></div>

  </div><!-- /#banner -->

  <script type="text/javascript">

    /* ── Populate Veeva / expiration from meta tags ──────── */
    document.getElementById("veeva-display").textContent =
      document.querySelector('meta[name="veeva-code"]').content;
    document.getElementById("exp-display").textContent =
      document.querySelector('meta[name="expiration-date"]').content;

    /* ── GCM click handlers ──────────────────────────────── */
    function exitHandler() {
      Enabler.exit("clickTag", clickTag);
    }
    function exitHandler2() {
      Enabler.exit("clickTag2", clickTag2);
    }

    /* ── Banner init — wait for GCM Enabler ─────────────── */
    function init() {
      buildTimeline();
    }

    if (Enabler.isInitialized()) {
      init();
    } else {
      Enabler.addEventListener(studio.events.StudioEvent.INIT, init);
    }

    /*
    ── GSAP timeline — 7 keyframes, :30s total, looping ────
    ─────────────────────────────────────────────────────────
    Frame   In      Hold    Out     Cumulative
    ──────────────────────────────────────────
    1       0.4s    3.0s    0.4s     3.8s
    2       0.4s    3.0s    0.4s     7.6s
    3       0.4s    3.0s    0.4s    11.4s
    4       0.4s    3.0s    0.4s    15.2s
    5       0.4s    3.0s    0.4s    19.0s
    6       0.4s    3.0s    0.4s    22.8s
    7*      0.4s    6.4s    0.4s    30.0s  ← end card + CTA
    ─────────────────────────────────────────────────────────
    * To use 6 frames: remove frame-7 block below and
      increase frame-6 hold to ~9.4s to stay at 30s.
    */
    function buildTimeline() {
      var tl = gsap.timeline({ repeat: -1, repeatDelay: 0 });

      tl.set("#frame-1", { opacity: 1 })
        .to("#frame-1", { opacity: 1, duration: 3.0 })
        .set("#frame-1", { opacity: 0 })
        .set("#frame-2", { opacity: 1 })
        .to("#frame-2", { opacity: 1, duration: 3.0 })
        .set("#frame-2", { opacity: 0 })
        .set("#frame-3", { opacity: 1 })
        .to("#frame-3", { opacity: 1, duration: 3.0 })
        .set("#frame-3", { opacity: 0 })
        .set("#frame-4", { opacity: 1 })
        .to("#frame-4", { opacity: 1, duration: 3.0 })
        .set("#frame-4", { opacity: 0 })
        .set("#frame-5", { opacity: 1 })
        .to("#frame-5", { opacity: 1, duration: 3.0 })
        .set("#frame-5", { opacity: 0 })
        .set("#frame-6", { opacity: 1 })
        .to("#frame-6", { opacity: 1, duration: 3.0 })
        .set("#frame-6", { opacity: 0 })
        .set("#frame-7", { opacity: 1 })
        .set("#cta-bar", { opacity: 1 }, "<")
        .to("#frame-7", { opacity: 1, duration: 6.4 })
        .set("#frame-7", { opacity: 0 })
        .set("#cta-bar", { opacity: 0 }, "<");
    }

  </script>
</body>
</html>
