<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="ad.size"         content="width=300,height=250">
  <meta name="veeva-code"      content="AGA-0000">
  <meta name="expiration-date" content="MM/DD/YYYY">

  <script type="text/javascript">
    var clickTag  = "https://example.com";
    var clickTag2 = "https://example.com/prescribing-information.pdf";
  </script>

  <script src="https://s0.2mdn.net/ads/studio/Enabler.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body { 
      width: 100%;
      height: 100%;
      overflow: hidden;
      cursor: pointer;
      -webkit-font-smoothing: antialiased;
    }

    #banner {
      position: relative;
      width:  300px;
      height: 250px;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #000000;
    }

    #bg {
      position: absolute;
      inset: 0;
      background: url(assets/rocks.jpg) center center / cover no-repeat;
    }

    .frame {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: center;
      opacity: 0;
      padding: 0;
      margin: 0;
    }

    .frame .boulders {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      max-width: 100%;
      height: auto;
      display: block;
      z-index:100;
    }

    /* Transparent wrapper — lets imgs participate directly in the frame's flex layout */
    .slide-content {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow:hidden;
      z-index:200;
    }

    .full-bg {
      background: #8EBE4E;
    }

    .legal {
      width: 100%;
      text-align: center;
      padding: 5px 8px;
      font-size: 10px;
      color: #44264A;
      pointer-events: none;
      white-space: nowrap;
      position: absolute;
      bottom: 4px;
    }

    #bg-exit {
      position: absolute;
      inset: 0;
      z-index: 10;
    }

    #pi-exit {
      position: absolute;
      bottom: 4px;
      right: 4px;
      width: 80px;
      height: 16px;
      z-index: 20;
    }

    .color-block {
      width: 100%;
      position:relative;
      background-color: #8EBE4E;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px 0px;
    }
    .purple {
      background-color: #44264A;
    }

    #frame-1 { opacity:0}
  </style>
</head>

<body>
  <div id="banner">
    
    <div id="frame-1" class="frame">
      <img src="assets/Timeline300x300.gif" alt="" class="boulders">
      <div class="slide-content">
        <img src="assets/text1.png" alt="Frame 1">
      </div>
    </div>

    <div id="frame-2" class="frame">
      <img src="assets/rocks-still.png" alt="" class="boulders">
      <div class="slide-content">
        <img src="assets/text2.png" alt="Frame 2">
      </div>
    </div>

    <div id="frame-3" class="frame">
      <img src="assets/rocks-still.png" alt="" class="boulders">
      <div class="slide-content">
        <div class="color-block">
         <img src="assets/text3.png" alt="Frame 3">
        </div>
      </div>
    </div>

    <div id="frame-4" class="frame full-bg">
      <div class="slide-content">
        <img src="assets/boulder2.png" alt="Frame 4">
        <img src="assets/text4.png" alt="Frame 4">
      </div>
      <div class="legal">
        <span>LEGAL-0000</span>&nbsp;|&nbsp;Exp:&nbsp;<span class="exp-display">MM/DD/YYYY</span>
      </div>
    </div>

    <div id="frame-5" class="frame full-bg">
      <div class="slide-content">
        <img src="assets/boulder3.png" alt="Frame 5">
        <img src="assets/vgcc-test.png" alt="Frame 5">
      </div>
      <div class="legal">
        <span>LEGAL-0001</span>&nbsp;|&nbsp;Exp:&nbsp;<span class="exp-display">MM/DD/YYYY</span>
      </div>
    </div>

    <div id="frame-6" class="frame full-bg">
      <div class="slide-content">
        <img src="assets/boulder4.png" alt="Frame 6">
        <img src="assets/txt-approach.png" alt="Frame 6">
        <div class="color-block purple">
          <img src="assets/group-14709.png" alt="" width="70%">
        </div>
      </div>
      <div class="legal">
        <span>LEGAL-0002</span>&nbsp;|&nbsp;Exp:&nbsp;<span class="exp-display">MM/DD/YYYY</span>
      </div>
    </div>

    <div id="frame-7" class="frame full-bg">
      <div class="slide-content">
        <img src="assets/cancer-lems.png" alt="End Card">
          <div class="color-block purple">
            <img src="assets/group-14709.png" alt="" width="70%">
        </div>
      </div>
      <div class="legal">
        <span>LEGAL-0003</span>&nbsp;|&nbsp;Exp:&nbsp;<span class="exp-display">MM/DD/YYYY</span>
      </div>
    </div>

    <div id="bg-exit" onclick="exitHandler()"></div>
    <div id="pi-exit" onclick="exitHandler2()"></div>
  </div>

  <script type="text/javascript">
    // Populate expiration date in all .legal containers from the meta tag
    const expDate = document.querySelector('meta[name="expiration-date"]').content;
    document.querySelectorAll('.exp-display').forEach(el => el.textContent = expDate);

    // GCM click handlers — must use Enabler.exit() per GCM spec; do not use addEventListener
    function exitHandler()  { Enabler.exit("clickTag",  clickTag);  }
    function exitHandler2() { Enabler.exit("clickTag2", clickTag2); }

    //Frame animations — using GSAP for sequencing and easing
    function animateFrame1() {
      const tl = gsap.timeline();
      tl.set("#frame-1", { opacity: 1 });
      tl.from("#frame-1 .slide-content", { y:"-=250",duration: 0.5, ease: "power1.out" },0.5);
      tl.to("#frame-1 .slide-content", { y:"+=250",duration: 0.5, ease: "power1.in", immediateRender: false },"+=1.5>");
      tl.set("#frame-1", { opacity: 0},"+=0.5");
      return tl;
    }
    function animateFrame2() {
      const tl = gsap.timeline();
      tl.set("#frame-2", { opacity: 1 });
      tl.from("#frame-2 .slide-content", { y:"-=250",duration: 0.5, ease: "power1.out" },0.5);
      tl.to("#frame-2 .slide-content", { opacity:0,duration: 0.5, ease: "power1.in", immediateRender: false },"+=1.5>");
      tl.set("#frame-2", { opacity: 0 },"+=0.5");
      return tl;
    }
    function animateFrame3() {
      const tl = gsap.timeline();
      tl.set("#frame-3", { opacity: 1 });
      tl.set("#frame-3", { delay: 3, opacity: 0 });
      return tl;
    }
    function animateFrame4() {
      const tl = gsap.timeline({defaults: { ease: "steps(1)" }});
      tl.set("#frame-4", { duration: 0.5, opacity: 1 });
      tl.set("#frame-4", { duration: 0.5, delay: 3, opacity: 0 });
      return tl;
    }
    function animateFrame5() {
      const tl = gsap.timeline({defaults: { ease: "steps(1)" }});
      tl.set("#frame-5", { duration: 0.5, opacity: 1 });
      tl.set("#frame-5", { duration: 0.5, delay: 3, opacity: 0 });
      return tl;
    }
    function animateFrame6() {
      const tl = gsap.timeline({defaults: { ease: "steps(1)" }});
      tl.set("#frame-6", { duration: 0.5, opacity: 1 });
      tl.set("#frame-6", { duration: 0.5, delay: 3, opacity: 0 });
      return tl;
    }
    function animateFrame7() {
      const tl = gsap.timeline({defaults: { ease: "steps(1)" }});
      tl.set("#frame-7", { duration: 0.5, opacity: 1 });
      tl.set("#frame-7", { duration: 0.5, delay: 3, opacity: 0 });
      return tl;
    }          

    var mainTimeline = gsap.timeline({ paused: true, repeat: -1 });

    // Build master timeline
    function buildTimeline() {
      mainTimeline.add(animateFrame1()).add(animateFrame2().add(animateFrame3()).add(animateFrame4()).add(animateFrame5()).add(animateFrame6()).add(animateFrame7()));
      mainTimeline.play();
    }

    // Wait for GCM Enabler to initialise before starting the animation
    function init() { buildTimeline(); }
    if (Enabler.isInitialized()) { init(); }
    else { Enabler.addEventListener(studio.events.StudioEvent.INIT, init); }
  </script>
  <script src="assets/debug-panel.js"></script>
</body>
</html>
