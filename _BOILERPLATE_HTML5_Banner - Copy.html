<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!--
  ============================================================
  BANNER CONFIG — update these for each banner
  ============================================================
  Naming convention: MMDDYY_Client-Brand_Description_HTML5_VeevaCode_Size
  Example:           043026_Catalyst-Agamree_NowApproved_HTML5_AGA-0038_300x250
  ============================================================
  -->
    <meta name="ad.size" content="width=300,height=250" />
    <meta name="veeva-code" content="AGA-0000" />
    <meta name="expiration-date" content="MM/DD/YYYY" />

    <!--
  ============================================================
  CLICK TAGS — destination URLs only, NO UTMs
  UTM params are appended by GCM at serve time via Enabler.exit()
  Add clickTag3, clickTag4, etc. as needed
  ============================================================
  -->
    <script type="text/javascript">
      var clickTag = "https://example.com";
      var clickTag2 = "https://example.com/prescribing-information.pdf";
    </script>

  <script src="https://s0.2mdn.net/ads/studio/Enabler.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        cursor: pointer;
        -webkit-font-smoothing: antialiased;
      }

      #banner {
        position: relative;
        width: 300px;
        height: 250px;
        overflow: hidden;
        font-family: Arial, sans-serif;
        background: #000000;
      }

      #bg {
        position: absolute;
        inset: 0;
        background: url(assets/rocks.jpg) center center / cover no-repeat;
      }

      .frame {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        opacity: 0;
        padding: 0 16px;
      }

      .frame img {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
      }

      /* Transparent wrapper — lets imgs participate directly in the frame's flex layout */
      .slide-content {
        display: contents;
      }

      .full-bg {
        background: #8ebe4e;
      }

      .color-block-animation {
        position: relative;
        width: calc(100% + 32px);
        margin-left: -16px;
        margin-right: -16px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .color-block {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        background: #44264a;
        z-index: 1;
      }

      .color-block-animation img {
        position: relative;
        z-index: 2;
        opacity: 0;
        visibility: hidden;
        object-fit: contain;
        padding-top: 10px;
      }

      .legal {
        position: absolute;
        bottom: 2px;
        width: 100%;
        text-align: center;
        padding: 5px 8px;
        font-size: 10px;
        color: #44264a;
        pointer-events: none;
        white-space: nowrap;
      }

      #bg-exit {
        position: absolute;
        inset: 0;
        z-index: 10;
      }

      #pi-exit {
        position: absolute;
        bottom: 4px;
        right: 4px;
        width: 80px;
        height: 16px;
        z-index: 20;
      }
    </style>
  </head>

  <body>
    <div id="banner">
      <div id="bg"></div>

      <div id="frame-1" class="frame">
        <div class="slide-content">
          <img src="assets/text1.png" alt="Frame 1" />
        </div>
      </div>

      <div id="frame-2" class="frame">
        <div class="slide-content">
          <img src="assets/text2.png" alt="Frame 2" />
        </div>
      </div>

      <div id="frame-3" class="frame">
        <div class="color-block-animation">
          <div class="color-block" style="background: #8ebe4e"></div>
          <img src="assets/text3.png" alt="Frame 3" />
        </div>
      </div>

      <div id="frame-4" class="frame full-bg">
        <div class="slide-content">
          <img src="assets/boulder2.png" alt="Frame 4" />
          <img src="assets/text4.png" alt="Frame 4" />
        </div>
        <div class="legal">
          <span>LEGAL-0000</span>
          >
        </div>
      </div>

      <div id="frame-5" class="frame full-bg">
        <div class="slide-content">
          <img src="assets/boulder3.png" alt="Frame 5" />
          <img src="assets/vgcc-test.png" alt="Frame 5" />
        </div>
        <div class="legal">
          <span>LEGAL-0001</span>
        </div>
      </div>

      <div id="frame-6" class="frame full-bg">
        <div class="slide-content">
          <img src="assets/boulder4.png" alt="Frame 6" />
          <img src="assets/txt-approach.png" alt="Frame 6" />
        </div>
        <div class="color-block-animation">
          <div class="color-block"></div>
          <img src="assets/group-14709.png" alt="" />
        </div>
        <div class="legal">
          <span>LEGAL-0002</span>
        </div>
      </div>

      <div id="frame-7" class="frame full-bg">
        <div class="slide-content">
          <img src="assets/cancer-lems.png" alt="End Card" />
        </div>
        <div class="color-block-animation">
          <div class="color-block"></div>
          <img src="assets/group-14709.png" alt="" />
        </div>
        <div class="legal">
          <span>LEGAL-0003</span>
          >
        </div>
      </div>

      <div id="bg-exit" onclick="exitHandler()"></div>
      <div id="pi-exit" onclick="exitHandler2()"></div>
    </div>
    <!-- /#banner -->

    <script type="text/javascript">
      /* ── Populate Veeva / expiration from meta tags ──────── */
      document.getElementById("veeva-display").textContent =
        document.querySelector('meta[name="veeva-code"]').content;
      document.getElementById("exp-display").textContent =
        document.querySelector('meta[name="expiration-date"]').content;

      /* ── GCM click handlers ──────────────────────────────── */
      function exitHandler() {
        Enabler.exit("clickTag", clickTag);
      }
      function exitHandler2() {
        Enabler.exit("clickTag2", clickTag2);
      }

      /* ── Banner init — wait for GCM Enabler ─────────────── */
      function init() {
        buildTimeline();
      }

      if (Enabler.isInitialized()) {
        init();
      } else {
        Enabler.addEventListener(studio.events.StudioEvent.INIT, init);
      }

      /*
    ── GSAP timeline — 7 keyframes, :30s total, looping ────
    ─────────────────────────────────────────────────────────
    Frame   In      Hold    Out     Cumulative
    ──────────────────────────────────────────
    1       0.4s    3.0s    0.4s     3.8s
    2       0.4s    3.0s    0.4s     7.6s
    3       0.4s    3.0s    0.4s    11.4s
    4       0.4s    3.0s    0.4s    15.2s
    5       0.4s    3.0s    0.4s    19.0s
    6       0.4s    3.0s    0.4s    22.8s
    7*      0.4s    6.4s    0.4s    30.0s  ← end card + CTA
    ─────────────────────────────────────────────────────────
    * To use 6 frames: remove frame-7 block below and
      increase frame-6 hold to ~9.4s to stay at 30s.
    */
      function buildTimeline() {
        var tl = gsap.timeline({ repeat: -1, repeatDelay: 0 });

        tl.set("#frame-1", { opacity: 1 })
          .to("#frame-1", { opacity: 1, duration: 3.0 })
          .set("#frame-1", { opacity: 0 })
          .set("#frame-2", { opacity: 1 })
          .to("#frame-2", { opacity: 1, duration: 3.0 })
          .set("#frame-2", { opacity: 0 })
          .set("#frame-3", { opacity: 1 })
          .to("#frame-3", { opacity: 1, duration: 3.0 })
          .set("#frame-3", { opacity: 0 })
          .set("#frame-4", { opacity: 1 })
          .to("#frame-4", { opacity: 1, duration: 3.0 })
          .set("#frame-4", { opacity: 0 })
          .set("#frame-5", { opacity: 1 })
          .to("#frame-5", { opacity: 1, duration: 3.0 })
          .set("#frame-5", { opacity: 0 })
          .set("#frame-6", { opacity: 1 })
          .to("#frame-6", { opacity: 1, duration: 3.0 })
          .set("#frame-6", { opacity: 0 })
          .set("#frame-7", { opacity: 1 })
          .set("#cta-bar", { opacity: 1 }, "<")
          .to("#frame-7", { opacity: 1, duration: 6.4 })
          .set("#frame-7", { opacity: 0 })
          .set("#cta-bar", { opacity: 0 }, "<");
      }
    </script>
  </body>
</html>
