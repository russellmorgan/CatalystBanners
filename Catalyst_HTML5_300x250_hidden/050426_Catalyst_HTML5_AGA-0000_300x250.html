<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="ad.size" content="width=300,height=250" />
    <meta name="veeva-code" content="AGA-0000" />
    <meta name="expiration-date" content="MM/DD/YYYY" />

    <script type="text/javascript">
      var clickTag = "https://example.com";
      var clickTag2 = "https://example.com/prescribing-information.pdf";
    </script>

    <script src="https://s0.2mdn.net/ads/studio/Enabler.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        cursor: pointer;
        -webkit-font-smoothing: antialiased;
      }

      #banner {
        position: relative;
        width: 300px;
        height: 250px;
        overflow: hidden;
        font-family: Arial, sans-serif;
        background: #000000;
      }

      .frame {
        position: absolute;
        inset: 0;
        opacity: 1;
        padding: 0;
        margin: 0;
        z-index:200;
      }

      .frame .woman {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        max-width: 100%;
        height: auto;
        display: block;
        z-index: 100;
        transform: scale(1.7) translateY(30px) translateX(-20px);
      }

      /* Transparent wrapper — lets imgs participate directly in the frame's flex layout */
      .slide-content {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        z-index: 200;
      }

      #bg-exit {
        position: absolute;
        inset: 0;
        z-index: 10;
      }

      #pi-exit {
        position: absolute;
        bottom: 4px;
        right: 4px;
        width: 80px;
        height: 16px;
        z-index: 20;
      }

      .color-block {
        width: 100%;
        height:250px;
        position: absolute;
        background-color: #8ebe4e;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        opacity:0;
        z-index:200;
      }
      .purple {
        background-color: #44264a;
      }
      .init {
        opacity: 0;
      }
      .img-block {
        display: block;
        margin: auto;
      }
      .legal {
        position: absolute;
        transform: translateY(220px);
        width: 100%;
        text-align: center;
      }
      .legal img {
        display: none;
      }
      .magnify {
        position: relative;
        margin-bottom:15px;
        margin-top:-30px;
        height:72px
      }
      .magnify img {
        position: absolute;
        left:50%;
        transform: translateX(-50%);
        z-index: 100;
      }
    </style>
  </head>

  <body>
    <div id="banner">
      <div class="frame">
        <img src="img/woman-bed.jpg" alt="" class="woman" />

        <div class="color-block purple" id="frame2">
          <div class="magnify">
            <img src="img/magnify.svg">
            <img src="img/maskgroup.png" style="transform: translateX(-85%) translateY(5px); z-index:50">
          </div>
          <img src="img/frame2txt.svg" id="frame2txt">
        </div>
        <div class="color-block" id="frame4">
          <img src="img/beaker.svg" style="height: 73px; width:53px; margin-bottom:10px">
          <img src="img/frame4txt.svg">
        </div>
        <div class="color-block" id="frame5" style="justify-content: flex-start; padding-top:10px">
          <img src="img/lightbulb.svg" style="height: 84px; width:81px; margin-bottom:10px">
          <img src="img/frame5txt.svg">
          <div class="purple" style="width: 100%; margin-top:20px;padding-top:10px; padding-bottom:10px; text-align: center; transform: translateX(0px);">
            <img src="img/frame5txt_banner.svg">
          </div>
        </div>
        
        <div class="legal">
          <img src="img/legal1.svg" />
          <img src="img/legal2.svg" />
          <img src="img/legal3.svg" />
          <img src="img/legal4.svg" />
        </div>
      </div>
      <div id="bg-exit" onclick="exitHandler()"></div>
      <div id="pi-exit" onclick="exitHandler2()"></div>
    </div>
    <!-- for dev -->
    <div style="position: absolute; bottom: 4px; right: 4px; z-index: 20">
      version 0.1
    </div>
    <script type="text/javascript">
      // GCM click handlers — must use Enabler.exit() per GCM spec; do not use addEventListener
      function exitHandler() {
        if (typeof Enabler !== "undefined") {
          Enabler.exit("clickTag", clickTag);
        }
      }
      function exitHandler2() {
        if (typeof Enabler !== "undefined") {
          Enabler.exit("clickTag2", clickTag2);
        }
      }

      // Frame animations — using GSAP for sequencing and easing

      function animationSequence() {
        const tl = gsap.timeline();
        tl.to(".woman", {scale:1.58, duration: 2, ease: "linear"});
        tl.to("#frame2", { opacity: 1, duration: 0.5 }, "-=0.25");
        tl.from(".magnify", { scale: 0, duration: 0.5, ease: "back.out(1.5)"},"-=0.25");
        tl.from("#frame2txt", { scale:0, duration: 0.5, ease: "back.out(1.5)"});
        tl.to("#frame2txt", { scale:0, duration: 0.5, ease: "back.in(1.5)"},"+=2");
        tl.to(".magnify img:nth-child(2)", { opacity:0, duration: 0.25});
        tl.to(".magnify", { scale:4.6, top:50, left:95, duration: 1, ease: "power2.inOut" });
        
        tl.to("#frame4", { opacity: 1, duration: 0.5 },"+=2");
        tl.to("#frame5", { opacity: 1, duration: 0.5 },"+=2");
        return tl;
      }

      function legalSequence() {
        const tl = gsap.timeline();
        tl.set(".legal img:nth-child(1)", { display: "none" }, 2.5);
        tl.set(".legal img:nth-child(2)", { display: "inline-block" }, 10.5);
        tl.set(".legal img:nth-child(2)", { display: "none" }, "+=1.5");
        tl.set(".legal img:nth-child(3)", { display: "inline-block" }, "+=2");
        tl.set(".legal img:nth-child(3)", { display: "none" }, "+=1.5");
        tl.set(".legal img:nth-child(4)", { display: "inline-block" }, "+=2");
        return tl;
      }
      const mainTimeline = gsap.timeline({
        paused: true,
        repeat: 0,
        repeatDelay: 2,
      });

      // Build master timeline
      function buildTimeline() {
        mainTimeline.add(animationSequence);
        mainTimeline.play();
      }

      // Wait for GCM Enabler to initialise before starting the animation
      function init() {
        buildTimeline();
      }
      if (typeof Enabler !== "undefined" && Enabler.isInitialized()) {
        init();
      } else if (typeof Enabler !== "undefined") {
        Enabler.addEventListener(studio.events.StudioEvent.INIT, init);
      } else {
        setTimeout(init, 100);
      } // Fallback for local testing
    </script>
  </body>
</html>
