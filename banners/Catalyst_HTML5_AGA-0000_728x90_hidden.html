<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="ad.size" content="width=728,height=90" />
        <meta name="veeva-code" content="CAL-0135" />
        <meta name="expiration-date" content="MM/DD/YYYY" />
        <title> </title>

        <script type="text/javascript">
            var clickTag = "https://www.CancerAssociatedLEMS.com";
        </script>

        <script src="https://s0.2mdn.net/ads/studio/Enabler.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            html,
            body {
                width: 100%;
                height: 100%;
                overflow: hidden;
                cursor: pointer;
                -webkit-font-smoothing: antialiased;
            }

            #banner {
                position: relative;
                width: 728px;
                height: 90px;
                overflow: hidden;
                font-family: Arial, sans-serif;
                background: #44264a;
            }

            .frame {
                position: absolute;
                inset: 0;
                opacity: 1;
                padding: 0;
                margin: 0;
                z-index: 200;
            }

            .frame .woman {
                position: absolute;
                top: 0;
                left: 0;
                width: 280px;
                object-fit: cover;
                object-position: 50% 30%;
                display: block;
                z-index: 100;
                scale: 1.2,
                will-change: transform, opacity;
                -webkit-mask-image: linear-gradient(
                    to right,
                    #000 calc(100% - 20px),
                    transparent 100%
                );
                mask-image: linear-gradient(
                    to right,
                    #000 calc(100% - 20px),
                    transparent 100%
                );
            }

            #bg-exit {
                position: absolute;
                inset: 0;
                z-index: 1000;
            }

            .color-block {
                width: 100%;
                height: 90px;
                position: absolute;
                background-color: #8ebe4e;
                display: flex;
                flex-direction: row;
                align-items: center;
                justify-content: center;
                opacity: 0;
                z-index: 200;
                will-change: opacity;
            }
            .purple {
                background-color: #44264a;
            }
            .legal {
                position: absolute;
                top: 0;
                right: 0;
                height: 90px;
                width: 100%;
                text-align: right;
                z-index: 300;
                display: flex;
                align-items: flex-end;
                justify-content: flex-end;
                padding-right: 20px;
                padding-bottom: 15px;
                pointer-events: none;
            }
            .legal img {
                display: none;
                position: relative;
            }

            #mask-circle {
                position: absolute;
                border-radius: 50%;
                /* purple box-shadow fills everything outside the circle */
                box-shadow: 0 0 0 800px #44264a;
                opacity: 0;
                z-index: 150;
                width: 76px;
                height: 76px;
                top: 5px;
                left: 146px;
                will-change: transform, opacity;
            }

            #frame3txt {
                position: absolute;
                left: 50%;
                top: 50%;
                transform: scale(0) translate(-50%, -50%);
                transform-origin: 0 0;
                opacity: 0;
                max-height: 70px;
            }

            #frame2 {
                justify-content: flex-start;
                padding-left: 170px;
            }

            .magnify {
                position: absolute;
                left: 45px;
                top: 0px;
                width: 90px;
                height: 90px;
                z-index: 250;
                opacity: 0;
                will-change: transform, opacity;
            }
            .magnify > img {
                position: absolute;
                left: 50%;
                top: 50%;
                transform: translate(-50%, -50%);
                height: 68px;
                width: auto;
                z-index: 100;
            }
            .magnify-face {
                width: 60px;
                height: 60px;
                border-radius: 50%;
                overflow: hidden;
                position: absolute;
                z-index: 50;
                opacity: 1;
                position: absolute;
                top: 15px;
                left: -5px;
            }
            .magnify-face img {
                width: 100%;
                height: 100%;
                object-fit: cover;
                transform: scale(2.7) translateY(13px) translateX(-13px);
                overflow: visible;
            }

            #frame4 {
                justify-content: flex-start;
                padding-left: 100px;
            }
            #frame4 #beaker {
                height: 60px;
                width: auto;
                margin-right: 25px;
            }

            #frame5 {
                justify-content: flex-start;
                padding-left: 60px;
            }
            #frame5 #lightbulb {
                height: 70px;
                width: auto;
                margin-right: 15px;
                margin-top: -5px;
            }
            #frame5txt {
                margin-top: -5px;
            }

            #purple {
                position: absolute;
                right: 70px;
                top: 0;
                height: 90px;
                width: 320px;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
            }

            #final_legal {
                position: absolute;
                bottom: 10px;
                right: 115px;
            }

            #frame3 {
                background-color: #44264a;
            }
            #frame3inner {
                position: absolute;
                left: 50%;
                top: 50%;
                transform: translate(-50%, -50%);
                max-height: 60px;
                z-index: 300;
                opacity: 0;
            }
        </style>
    </head>

    <body>
        <div id="banner">
            <div class="frame">
                <img src="img/hidden/woman-bed.jpg" alt="" class="woman" />
                <div id="mask-circle"></div>

                <div class="color-block purple" id="frame2">
                    <img
                        src="img/wide/slide2txt_wide_hidden.svg"
                        id="frame2txt"
                    />
                </div>

                <div class="color-block purple" id="frame3"></div>

                <div class="color-block" id="frame4">
                    <img src="img/hidden/beaker.svg" id="beaker" />
                    <img
                        src="img/wide/slide4txt_wide_hidden.svg"
                        id="frame4txt"
                    />
                </div>

                <div class="color-block" id="frame5">
                    <img src="img/hidden/lightbulb.svg" id="lightbulb" />
                    <img
                        src="img/wide/slide5txt_wide_hidden.svg"
                        id="frame5txt"
                    />
                    <div class="purple" id="purple">
                        <img src="img/wide/slide5txt_wide_hidden_banner.svg" />
                    </div>
                </div>

                <div class="magnify">
                    <img src="img/hidden/magnify.svg" />
                    <div class="magnify-face">
                        <img src="img/hidden/woman-bed.jpg" alt="" />
                    </div>
                </div>
                <img
                    src="img/wide/slide3txt_wide_hidden.svg"
                    id="frame3inner"
                />

                <div class="legal">
                    <img src="img/wide/legal1_wide_hidden.svg" />
                    <img src="img/wide/legal2_wide_hidden.svg" />
                    <img src="img/legal3.svg" />
                    <img
                        src="img/wide/legal5_wide_hidden.svg"
                        id="final_legal"
                    />
                </div>
            </div>
            <div id="bg-exit" onclick="exitHandler()"></div>
        </div>

        <script type="text/javascript">
            // GCM click handlers — must use Enabler.exit() per GCM spec; do not use addEventListener
            function exitHandler() {
                if (typeof Enabler !== "undefined" && Enabler.isInitialized()) {
                    Enabler.exit("clickTag", clickTag);
                } else {
                    window.open(clickTag, "_blank");
                }
            }

            function animationSequence() {
                const tl = gsap.timeline();

                // Frame 1: woman holds with subtle drift
                tl.to(".woman", {
                    duration: 2,
                    ease: "power2.inOut",
                    force3D: true,
                });

                // Mask circle fades in — purple fills everything outside, woman's face shows through
                tl.to("#mask-circle", { opacity: 1, duration: 0.5 });

                // Both the circle and the woman scale down together
                tl.to(
                    "#mask-circle",
                    {
                        width: 64,
                        height: 64,
                        x: -106,
                        y: 10,
                        duration: 1,
                        ease: "power2.inOut",
                    },
                    "shrink",
                );
                tl.to(
                    ".woman",
                    {
                        scale: 1,
                        y: "1",
                        x: "-=104",
                        duration: 1,
                        ease: "power2.inOut",
                    },
                    "shrink",
                );

                // Frame2 purple block takes over
                tl.to("#frame2", { opacity: 1, duration: 0.5 });

                // Magnifying glass pops in
                tl.to(
                    ".magnify",
                    { opacity: 1, duration: 0.5, ease: "power1.inOut" },
                    "-=0.75",
                );
                // Text pops in
                tl.from("#frame2txt", {
                    scale: 0,
                    duration: 0.5,
                    ease: "back.out(1)",
                });
                tl.to(
                    "#frame2txt",
                    { scale: 0, duration: 0.5, ease: "back.in(1)" },
                    "+=5",
                );
                tl.to(".woman, .magnify-face", { opacity: 0, duration: 0.4 });

                // Magnifying glass scales up & centers — its rim becomes the green edges of frame3
                tl.to(".magnify > img", {
                    rotate: 180,
                    duration: 1.2,
                    ease: "power2.inOut",
                    force3D: false,
                });
                tl.to(
                    ".magnify",
                    {
                        scale: 8,
                        x: 115,
                        duration: 1.2,
                        ease: "power2.inOut",
                        force3D: false,
                    },
                    "<",
                );
                tl.to("#frame3", { opacity: 1, duration: 0.4 }, "-=0.7");
                tl.fromTo(
                    "#frame3inner",
                    { opacity: 0, scale: 0.6 },
                    {
                        opacity: 1,
                        scale: 1,
                        duration: 0.5,
                        ease: "back.out(1.25)",
                    },
                    "-=0.2",
                );
                tl.to("#frame3inner", { opacity: 0, duration: 0.4 }, "+=3");
                tl.to(
                    ".magnify",
                    { scale: 16, left: "-=25%", opacity: 0, duration: 0.4 },
                    "<+=0.1",
                );

                // Frame 4 — green with beaker + VGCC text
                tl.to("#frame4", { opacity: 1, duration: 0.5 }, "-=0.2");
                tl.from("#beaker", {
                    scale: 0,
                    duration: 0.5,
                    ease: "back.out(1)",
                });
                tl.from(
                    "#frame4txt",
                    { scale: 0, duration: 0.5, ease: "back.out(1)" },
                    "-=0.25",
                );

                // Frame 5 — green with lightbulb + Discover + purple banner
                tl.to("#frame5", { opacity: 1, duration: 0.5 }, "+=2");
                tl.from("#lightbulb", {
                    scale: 0,
                    duration: 0.5,
                    ease: "back.out(1)",
                });
                tl.from(
                    "#frame5txt",
                    {
                        scale: 0,
                        duration: 0.5,
                        ease: "back.out(1)",
                    },
                    "-=0.25",
                );
                tl.from("#purple", {
                    x: 600,
                    duration: 0.5,
                    ease: "power1.inOut",
                });
                tl.from(
                    "#purple img",
                    { opacity: 0, duration: 0.5, ease: "power2.inOut" },
                    "-=0.1",
                );
                return tl;
            }

            function legalSequence() {
                const tl = gsap.timeline();
                // legal1 — during frame2 "most common" copy (PNS / SCLC / Reference)
                tl.set(
                    ".legal img:nth-child(1)",
                    { display: "inline-block" },
                    4.75,
                );
                tl.set(".legal img:nth-child(1)", { display: "none" }, 9.75);

                // legal2 — during frame4 "VGCC-Ab" copy
                tl.set(
                    ".legal img:nth-child(2)",
                    { display: "inline-block" },
                    12.2,
                );
                tl.set(".legal img:nth-child(2)", { display: "none" }, 15.1);

                // legal5 — during frame5 endcard (copyright / job code)
                tl.set(
                    ".legal img:nth-child(3)",
                    { display: "inline-block" },
                    16.5,
                );
                tl.set(".legal img:nth-child(3)", { display: "none" }, 18.8);

                tl.set("#final_legal", { display: "inline-block" }, 20.8);
                return tl;
            }

            var mainTimeline = gsap.timeline({ paused: true });

            function buildTimeline() {
                mainTimeline.add(animationSequence()).add(legalSequence(), "<");
                mainTimeline.play();
            }

            function init() {
                buildTimeline();
            }
            // Set woman's initial state immediately so there's no flash of unstyled content
            gsap.set(".woman", { scale: 1.2, y: 0, x: 0 });

            if (typeof Enabler !== "undefined" && Enabler.isInitialized()) {
                init();
            } else if (typeof Enabler !== "undefined") {
                Enabler.addEventListener(studio.events.StudioEvent.INIT, init);
            } else {
                setTimeout(init, 100);
            } // Fallback for local testing
        </script>
        <script src="../assets/debug-panel.js"></script>
    </body>
</html>
