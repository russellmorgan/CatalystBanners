<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="ad.size"         content="width=300,height=250">
  <meta name="veeva-code"      content="AGA-0000">
  <meta name="expiration-date" content="MM/DD/YYYY">

  <script type="text/javascript">
    var clickTag  = "https://example.com";
    var clickTag2 = "https://example.com/prescribing-information.pdf";
  </script>

  <script src="https://s0.2mdn.net/ads/studio/Enabler.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      cursor: pointer;
      -webkit-font-smoothing: antialiased;
    }

    #banner {
      position: relative;
      width:  300px;
      height: 250px;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #000000;
    }

    #bg {
      position: absolute;
      inset: 0;
      background: url(assets/rocks.jpg) center center / cover no-repeat;
    }

    .frame {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      padding: 0 16px;
    }

    .frame img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    /* Transparent wrapper — lets imgs participate directly in the frame's flex layout */
    .slide-content {
      display: contents;
    }

    .full-bg {
      background: #8EBE4E;
    }

    .color-block-animation {
      position: relative;
      width: calc(100% + 32px);
      margin-left: -16px;
      margin-right: -16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .color-block {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      background: #44264A;
      z-index: 1;
    }

    .color-block-animation img {
      position: relative;
      z-index: 2;
      opacity: 0;
      visibility: hidden;
      object-fit: contain;
      padding-top: 10px;
    }

    .legal {
      position: absolute;
      bottom: 2px;
      width: 100%;
      text-align: center;
      padding: 5px 8px;
      font-size: 10px;
      color: #44264A;
      pointer-events: none;
      white-space: nowrap;
    }

    #bg-exit {
      position: absolute;
      inset: 0;
      z-index: 10;
    }

    #pi-exit {
      position: absolute;
      bottom: 4px;
      right: 4px;
      width: 80px;
      height: 16px;
      z-index: 20;
    }
  </style>
</head>

<body>
  <div id="banner">
    <div id="bg"></div>

    <div id="frame-1" class="frame">
      <div class="slide-content">
        <img src="assets/text1.png" alt="Frame 1">
      </div>
    </div>

    <div id="frame-2" class="frame">
      <div class="slide-content">
        <img src="assets/text2.png" alt="Frame 2">
      </div>
    </div>

    <div id="frame-3" class="frame">
      <div class="color-block-animation">
        <div class="color-block" style="background: #8EBE4E;"></div>
        <img src="assets/text3.png" alt="Frame 3">
      </div>
    </div>

    <div id="frame-4" class="frame full-bg">
      <div class="slide-content">
        <img src="assets/boulder2.png" alt="Frame 4">
        <img src="assets/text4.png" alt="Frame 4">
      </div>
      <div class="legal">
        <span>LEGAL-0000</span>&nbsp;|&nbsp;Exp:&nbsp;<span class="exp-display">MM/DD/YYYY</span>
      </div>
    </div>

    <div id="frame-5" class="frame full-bg">
      <div class="slide-content">
        <img src="assets/boulder3.png" alt="Frame 5">
        <img src="assets/vgcc-test.png" alt="Frame 5">
      </div>
      <div class="legal">
        <span>LEGAL-0001</span>&nbsp;|&nbsp;Exp:&nbsp;<span class="exp-display">MM/DD/YYYY</span>
      </div>
    </div>

    <div id="frame-6" class="frame full-bg">
      <div class="slide-content">
        <img src="assets/boulder4.png" alt="Frame 6">
        <img src="assets/txt-approach.png" alt="Frame 6">
      </div>
      <div class="color-block-animation">
        <div class="color-block"></div>
        <img src="assets/group-14709.png" alt="">
      </div>
      <div class="legal">
        <span>LEGAL-0002</span>&nbsp;|&nbsp;Exp:&nbsp;<span class="exp-display">MM/DD/YYYY</span>
      </div>
    </div>

    <div id="frame-7" class="frame full-bg">
      <div class="slide-content">
        <img src="assets/cancer-lems.png" alt="End Card">
      </div>
      <div class="color-block-animation">
        <div class="color-block"></div>
        <img src="assets/group-14709.png" alt="">
      </div>
      <div class="legal">
        <span>LEGAL-0003</span>&nbsp;|&nbsp;Exp:&nbsp;<span class="exp-display">MM/DD/YYYY</span>
      </div>
    </div>

    <div id="bg-exit" onclick="exitHandler()"></div>
    <div id="pi-exit" onclick="exitHandler2()"></div>
  </div>

  <script type="text/javascript">
    // Populate expiration date in all .legal containers from the meta tag
    const expDate = document.querySelector('meta[name="expiration-date"]').content;
    document.querySelectorAll('.exp-display').forEach(el => el.textContent = expDate);

    // GCM click handlers — must use Enabler.exit() per GCM spec; do not use addEventListener
    function exitHandler()  { Enabler.exit("clickTag",  clickTag);  }
    function exitHandler2() { Enabler.exit("clickTag2", clickTag2); }

    // Slides imgs[0] down from above into position. If a second image is present,
    // it fades in with a 0.2s overlap at the end of the first animation.
    function createTopToCenterAnimation(container, options = {}) {
      const { duration = 1, ease = 'power2.out' } = options;
      const imgs = container.querySelectorAll('img');
      const tl = gsap.timeline();

      tl.fromTo(imgs[0], { y: "-100%", opacity: 0 }, { y: 0, opacity: 1, duration, ease });

      if (imgs.length > 1) {
        tl.fromTo(imgs[1], { opacity: 0 }, { opacity: 1, duration: duration * 0.5 }, ">-0.2");
      }

      return tl;
    }

    // Slides a solid color block in from the left, then fades in the image on top of it.
    // Expects .color-block and an img inside the container element.
    function createColorBlockWithFadeAnimation(container, options = {}) {
      const {
        blockDuration = 1,
        fadeDuration  = 0.6,
        blockEase     = 'power2.out',
        fadeEase      = 'power1.inOut'
      } = options;

      const block = container.querySelector('.color-block');
      const img   = container.querySelector('img');

      if (!block || !img) {
        console.warn('[animation] block or image not found');
        return null;
      }

      return gsap.timeline()
        .fromTo(block, { xPercent: -100 }, { xPercent: 0, duration: blockDuration, ease: blockEase })
        // Fade in image with a slight overlap into the end of the block slide
        .to(img, { autoAlpha: 1, duration: fadeDuration, ease: fadeEase }, `>-${fadeDuration * 0.5}`);
    }

    // Builds a self-contained GSAP timeline for a single frame.
    // Detects .slide-content and .color-block-animation inside the frame and sequences them.
    // hold = total visible duration in seconds; frame hides at that absolute time.
    function buildFrameTimeline(id, hold) {
      const frame      = document.getElementById(id);
      const slide      = frame.querySelector('.slide-content');
      const colorBlock = frame.querySelector('.color-block-animation');
      const tl         = gsap.timeline();

      tl.set(frame, { opacity: 1 });

      if (slide) {
        tl.add(createTopToCenterAnimation(slide, { duration: 0.8 }), 0);
      }

      if (colorBlock) {
        const colorBlockAnim = createColorBlockWithFadeAnimation(colorBlock, { blockDuration: 0.8, fadeDuration: 0.6 });
        // If a slide preceded it, start after slide finishes; otherwise start at 0
        if (colorBlockAnim) tl.add(colorBlockAnim, slide ? ">" : 0);
      }

      // Hide the frame at the hold time — this sets the child timeline's total duration
      tl.set(frame, { opacity: 0 }, hold);

      return tl;
    }

    // Master timeline — add frame child timelines sequentially.
    // To offset a frame's start, change ">" to e.g. "<+0.5" (0.5s after prev starts).
    // hold values are per-frame visible duration in seconds.
    function buildTimeline() {
      const masterTl = gsap.timeline({ repeat: -1, repeatDelay: 0 });

      masterTl.add(buildFrameTimeline('frame-1', 3.0), '>');
      masterTl.add(buildFrameTimeline('frame-2', 3.0), '>');
      masterTl.add(buildFrameTimeline('frame-3', 3.0), '>');
      masterTl.add(buildFrameTimeline('frame-4', 3.0), '>');
      masterTl.add(buildFrameTimeline('frame-5', 3.0), '>');
      masterTl.add(buildFrameTimeline('frame-6', 3.0), '>');
      masterTl.add(buildFrameTimeline('frame-7', 6.4), '>');
    }

    // Wait for GCM Enabler to initialise before starting the animation
    function init() { buildTimeline(); }
    if (Enabler.isInitialized()) { init(); }
    else { Enabler.addEventListener(studio.events.StudioEvent.INIT, init); }
  </script>
</body>
</html>
