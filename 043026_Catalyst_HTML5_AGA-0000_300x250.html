<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="ad.size"         content="width=300,height=250">
  <meta name="veeva-code"      content="AGA-0000">
  <meta name="expiration-date" content="MM/DD/YYYY">

  <script type="text/javascript">
    var clickTag  = "https://example.com";
    var clickTag2 = "https://example.com/prescribing-information.pdf";
  </script>

  <script src="https://s0.2mdn.net/ads/studio/Enabler.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      cursor: pointer;
      -webkit-font-smoothing: antialiased;
    }

    #banner {
      position: relative;
      width:  300px;
      height: 250px;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #000000;
    }

    #bg {
      position: absolute;
      inset: 0;
      background: url(assets/rocks.jpg) center center / cover no-repeat;
    }

    #frame-1,
    #frame-2,
    #frame-3,
    #frame-4,
    #frame-5,
    #frame-6,
    #frame-7 {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      padding: 0 16px;
    }

    #frame-1 img,
    #frame-2 img,
    #frame-3 img,
    #frame-4 img,
    #frame-5 img,
    #frame-6 img,
    #frame-7 img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    /* Optional full-screen background color for frames */
    .full-bg {
      background: #8EBE4E;
    }

    .purple-bg {
      background: #44264A;
      width: calc(100% + 32px);
      margin-left: -16px;
      margin-right: -16px;
    }

    .color-block-animation {
      position: relative;
      width: calc(100% + 32px);
      margin-left: -16px;
      margin-right: -16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .color-block {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      background: #44264A;
      z-index: 1;
    }

    .color-block-animation img {
      position: relative;
      z-index: 2;
      opacity: 0;
      visibility: hidden;
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    .headline {
      color: #ffffff;
      font-size: 22px;
      font-weight: bold;
      text-align: center;
      line-height: 1.2;
    }

    .subline {
      color: #ffffff;
      font-size: 13px;
      text-align: center;
      margin-top: 8px;
      line-height: 1.3;
    }

    #cta-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 40px;
      background: #44264A;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
    }

    #cta-bar span {
      color: #ffffff;
      font-size: 14px;
      font-weight: bold;
      letter-spacing: 0.5px;
    }

    #legal {
      position: absolute;
      bottom: 2px;
      width:100%;
      text-align: center;
      padding: 5px 8px;
      font-size: 10px;
      color: #44264A;
      pointer-events: none;
      white-space: nowrap;
    }


    #bg-exit {
      position: absolute;
      inset: 0;
      z-index: 10;
    }

    #pi-exit {
      position: absolute;
      bottom: 44px;
      right: 4px;
      width: 80px;
      height: 16px;
      z-index: 20;
    }
  </style>
</head>

<body>
  <div id="banner">
    <div id="bg"></div>

    <div id="frame-1"><img src="assets/text1.png" alt="Frame 1"></div>
    <div id="frame-2"><img src="assets/text2.png" alt="Frame 2"></div>
    <div id="frame-3">
      <div class="color-block-animation">
        <div class="color-block" style="background: #8EBE4E;"></div>
        <img src="assets/text3.png" alt="Frame 3">
      </div>
    </div>
    <div id="frame-4" class="full-bg">
      <img src="assets/boulder2.png" alt="Frame 4">
      <img src="assets/text4.png" alt="Frame 4">
        <div id="legal">
          <span id="veeva-display">AGA-0000</span>&nbsp;|&nbsp;Exp:&nbsp;<span id="exp-display">MM/DD/YYYY</span>
      </div>
    </div>
    <div id="frame-5" class="full-bg">
      <img src="assets/boulder3.png" alt="Frame 5">
      <img src="assets/vgcc-test.png" alt="Frame 5">
        <div id="legal">
          <span id="veeva-display">AGA-0001</span>&nbsp;|&nbsp;Exp:&nbsp;<span id="exp-display">MM/DD/YYYY</span>
      </div>
    </div>
    <div id="frame-6" class="full-bg">
      <img src="assets/boulder4.png" alt="Frame 6">
      <img src="assets/txt-approach.png" alt="Frame 6">
      <div class="color-block-animation">
        <div class="color-block"></div>
        <img src="assets/group-14709.png" alt="">
      </div>
        <div id="legal">
          <span id="veeva-display">AGA-0002</span>&nbsp;|&nbsp;Exp:&nbsp;<span id="exp-display">MM/DD/YYYY</span>
      </div>
    </div>
    <div id="frame-7" class="full-bg">
      <img src="assets/cancer-lems.png" alt="End Card">
      <div class="color-block-animation">
        <div class="color-block"></div>
        <img src="assets/group-14709.png" alt="">
      </div>
        <div id="legal">
          <span id="veeva-display">AGA-0003</span>&nbsp;|&nbsp;Exp:&nbsp;<span id="exp-display">MM/DD/YYYY</span>
      </div>
    </div>

    <div id="bg-exit" onclick="exitHandler()"></div>
    <div id="pi-exit" onclick="exitHandler2()"></div>
  </div>

  <script type="text/javascript">
    document.getElementById("veeva-display").textContent =
      document.querySelector('meta[name="veeva-code"]').content;
    document.getElementById("exp-display").textContent =
      document.querySelector('meta[name="expiration-date"]').content;

    function exitHandler()  { Enabler.exit("clickTag",  clickTag);  }
    function exitHandler2() { Enabler.exit("clickTag2", clickTag2); }

    function createTopToCenterAnimation(target, options = {}) {
      // Animate element sliding down from top to center with fade-in
      const {
        duration = 1,
        ease = 'power2.out'
      } = options;

      const tl = gsap.timeline();
      tl.fromTo(target,
          { y: "-100%", opacity: 0 },
          { y: 0, opacity: 1, duration, ease }
        );

      return tl;
    }

    function createColorBlockWithFadeAnimation(container, options = {}) {
      // Extract animation config with sensible defaults
      const {
        blockSelector = '.color-block',
        imageSelector = 'img',
        blockDuration = 1,
        fadeDuration = 0.6,
        blockEase = 'power2.out',
        fadeEase = 'power1.inOut'
      } = options;

      // Query DOM for animation targets
      const block = container.querySelector(blockSelector);
      const img = container.querySelector(imageSelector);

      // Guard: ensure both elements exist
      if (!block || !img) {
        console.warn('[animation] block or image not found');
        return null;
      }

      // Create timeline for sequenced animation
      const tl = gsap.timeline();

      // Slide colored block in from left (xPercent: -100 to 0)
      tl.fromTo(block,
          { xPercent: -100 },
          { xPercent: 0, duration: blockDuration, ease: blockEase }
        )
        // Fade in image after block (with slight overlap: -50% of fadeDuration)
        .to(img, { autoAlpha: 1, duration: fadeDuration, ease: fadeEase }, `>-${fadeDuration * 0.5}`);

      return tl;
    }

    function init() { buildTimeline(); }
    if (Enabler.isInitialized()) { init(); }
    else { Enabler.addEventListener(studio.events.StudioEvent.INIT, init); }

    function buildTimeline() {
      var tl = gsap.timeline({ repeat: -1, repeatDelay: 0 });

      tl.set("#frame-1", { opacity: 1 });

      const frame1Img = document.querySelector("#frame-1 img");
      if (frame1Img) {
        tl.add(createTopToCenterAnimation(frame1Img, { duration: 0.8 }), "<");
      }

      tl.to("#frame-1", { duration: 3.0 }, "<")
        .set("#frame-1", { opacity: 0 })
        .set("#frame-2", { opacity: 1 });

      const frame2Img = document.querySelector("#frame-2 img");
      if (frame2Img) {
        tl.add(createTopToCenterAnimation(frame2Img, { duration: 0.8 }), "<");
      }

      tl.to("#frame-2", { duration: 3.0 }, "<")
        .set("#frame-2", { opacity: 0 })
        .set("#frame-3", { opacity: 1 });

      const frame3Container = document.querySelector("#frame-3 .color-block-animation");
      if (frame3Container) {
        tl.add(createColorBlockWithFadeAnimation(frame3Container, {
          blockDuration: 0.8,
          fadeDuration: 0.6
        }), "<");
      }

      tl.to("#frame-3", { duration: 3.0 }, "<")
        .set("#frame-3", { opacity: 0 })
        .set("#frame-4", { opacity: 1 });

      const frame4Imgs = document.querySelectorAll("#frame-4 img");
      if (frame4Imgs.length) {
        frame4Imgs.forEach((img, index) => {
          tl.add(createTopToCenterAnimation(img, { duration: 0.8 }), index === 0 ? "<" : "<0.1");
        });
      }

      tl.to("#frame-4", { duration: 3.0 }, "<")
        .set("#frame-4", { opacity: 0 })
        .set("#frame-5", { opacity: 1 });

      const frame5Imgs = document.querySelectorAll("#frame-5 img");
      if (frame5Imgs.length) {
        frame5Imgs.forEach((img, index) => {
          tl.add(createTopToCenterAnimation(img, { duration: 0.8 }), index === 0 ? "<" : "<0.1");
        });
      }

      tl.to("#frame-5", { duration: 3.0 }, "<")
        .set("#frame-5", { opacity: 0 })
        .set("#frame-6", { opacity: 1 });

      // Add color block animation for frame-6
      const frame6Container = document.querySelector("#frame-6 .color-block-animation");
      if (frame6Container) {
        const colorBlockAnim = createColorBlockWithFadeAnimation(frame6Container, {
          blockDuration: 0.8,
          fadeDuration: 0.6
        });
        tl.add(colorBlockAnim, "<");
      }

      tl.to("#frame-6", { opacity: 1, duration: 3.0 }, "<")
        .set("#frame-6", { opacity: 0 })
        .set("#frame-7", { opacity: 1 })
        .set("#cta-bar", { opacity: 1 }, "<");

      const frame7Container = document.querySelector("#frame-7 .color-block-animation");
      if (frame7Container) {
        tl.add(createColorBlockWithFadeAnimation(frame7Container, {
          blockDuration: 0.8,
          fadeDuration: 0.6
        }), "<");
      }

      tl.to("#frame-7", { duration: 6.4 }, "<")
        .set("#frame-7", { opacity: 0 })
        .set("#cta-bar", { opacity: 0 }, "<");
    }
  </script>
</body>
</html>
